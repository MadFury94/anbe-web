name = "anbe-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "anbe-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[vars]
CORS_ORIGIN = "https://anbenig.com"

# Secrets (set via: wrangler secret put ADMIN_PASSWORD)
# ADMIN_USERNAME
# ADMIN_PASSWORD
# JWT_SECRET
